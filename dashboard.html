<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema MARGEN™</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="auth.js"></script>
<script>
if (!_isLoggedIn()) {
  localStorage.setItem('dr_return', location.href);
  location.replace('login.html');
}
</script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;700&family=Montserrat:wght@500;700&family=DM+Sans:wght@300;400;500&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>

*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;background:#0A0A0A;color:#F8F4EE;font-family:'DM Sans',sans-serif;}

/* ══ HEADER ══ */
.header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:58px;background:#0A0A0A;border-bottom:1px solid #181818;
  display:flex;align-items:center;padding:0 28px;gap:12px;
}
.header-logo{
  font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;
  letter-spacing:3px;color:#B87A4E;text-transform:uppercase;white-space:nowrap;
}
.header-sep{width:1px;height:18px;background:#222;flex-shrink:0;}
.header-system{
  font-family:'Space Mono',monospace;font-size:8px;letter-spacing:3px;
  text-transform:uppercase;color:#282420;
}
.header-right{display:flex;align-items:center;gap:12px;margin-left:auto;}
.header-user{
  font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;
  color:#2E2A28;text-transform:lowercase;
}
.header-logout{
  background:none;border:1px solid #222;color:#3A3430;
  font-family:'Space Mono',monospace;font-size:7px;letter-spacing:2px;
  text-transform:uppercase;padding:6px 14px;cursor:pointer;
  transition:color .2s,border-color .2s;
}
.header-logout:hover{color:#B87A4E;border-color:rgba(184,122,78,0.35);}

/* ══ BODY ══ */
.body{padding-top:58px;}
.inner{max-width:1180px;margin:0 auto;padding:44px 28px 80px;}

/* ══ GREETING ══ */
.greeting-row{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:36px;}
.greeting{
  font-family:'Cormorant Garamond',serif;
  font-size:46px;font-weight:300;line-height:1;letter-spacing:-1px;color:#F8F4EE;
}
.greeting b{font-weight:700;color:#B87A4E;}
.greeting-meta{text-align:right;}
.greeting-date{
  font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;
  text-transform:uppercase;color:#222;margin-bottom:6px;
}
.role-chip{
  display:inline-block;font-family:'Space Mono',monospace;font-size:7px;
  letter-spacing:2px;text-transform:uppercase;
  padding:4px 10px;border:1px solid rgba(184,122,78,0.2);color:#6A5A50;
}

/* ══ STATS ══ */
.stats{display:flex;margin-bottom:48px;border:1px solid #181818;overflow:hidden;}
.stat{flex:1;padding:20px 22px;border-right:1px solid #181818;cursor:default;}
.stat:last-child{border-right:none;}
.stat:hover{background:rgba(184,122,78,0.02);}
.stat-num{
  font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:700;
  line-height:1;color:#B87A4E;margin-bottom:6px;display:block;
}
.stat-num.dim{color:#282420;}
.stat-lbl{
  font-family:'Space Mono',monospace;font-size:7px;letter-spacing:2px;
  text-transform:uppercase;color:#282420;
}
.stat-coming{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:2px;color:#1E1A18;}

/* ══ SECTION LABEL ══ */
.section-label{
  font-family:'Space Mono',monospace;font-size:7px;letter-spacing:4px;
  text-transform:uppercase;color:#222;margin-bottom:20px;
}

/* ══ APP GRID ══ */
.apps{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(148px,1fr));
  gap:10px;
}

/* ══ APP CARD ══ */
.app{
  background:#0E0E0E;
  border:1px solid #1A1A1A;
  border-radius:10px;
  padding:26px 16px 20px;
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:14px;
  transition:background .18s,border-color .18s,transform .18s,box-shadow .18s;
  user-select:none;
  text-decoration:none;
}
.app:hover{
  background:#131313;
  border-color:rgba(184,122,78,0.4);
  transform:translateY(-3px);
  box-shadow:0 8px 28px rgba(0,0,0,0.4);
}
.app-icon{
  width:56px;height:56px;border-radius:13px;
  background:rgba(184,122,78,0.07);
  display:flex;align-items:center;justify-content:center;
  transition:background .18s;
  flex-shrink:0;
}
.app:hover .app-icon{background:rgba(184,122,78,0.13);}
.app-name{
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:400;
  color:#8A8280;text-align:center;line-height:1.3;
  transition:color .18s;
}
.app:hover .app-name{color:#C8C0B8;}

/* ── Card states ── */
.app.soon{opacity:0.28;cursor:default;pointer-events:none;}
.app.locked{opacity:0.2;cursor:not-allowed;}
.app.locked:hover{background:#0E0E0E;border-color:#1A1A1A;transform:none;box-shadow:none;}

/* ══ TOAST ══ */
.toast{
  position:fixed;bottom:24px;right:24px;z-index:500;
  background:#0D0D0D;border:1px solid rgba(184,122,78,0.25);border-left:3px solid #B87A4E;
  padding:10px 18px;
  font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;
  color:#B87A4E;opacity:0;transform:translateY(4px);
  transition:opacity .22s,transform .22s;pointer-events:none;
}
.toast.on{opacity:1;transform:translateY(0);}
.toast.warn{border-left-color:#9A6060;color:#9A6060;}

@media(max-width:600px){
  .stats{flex-wrap:wrap;}
  .stat{flex:1 1 45%;border-right:none;border-bottom:1px solid #181818;}
  .inner{padding:32px 16px 60px;}
  .greeting{font-size:32px;}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <span class="header-logo">Diana Reátegui</span>
  <div class="header-sep"></div>
  <span class="header-system">Sistema MARGEN™</span>
  <div class="header-right">
    <span class="header-user" id="h-user"></span>
    <button class="header-logout" onclick="authLogout()">Salir</button>
  </div>
</header>

  <div class="greeting-row">
    <div class="greeting" id="greeting">Bienvenida, <b>Diana</b></div>
    <div class="greeting-meta">
      <div class="greeting-date" id="g-date"></div>

  <!-- STATS CRM -->
  <div class="stats">
    <div class="stat">
      <span class="stat-num" id="s-total">—</span>
      <span class="stat-lbl">Leads totales</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="s-activos">—</span>
      <span class="stat-lbl">En pipeline</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="s-valor">—</span>
      <span class="stat-lbl">Valor pipeline</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="s-ganados">—</span>
      <span class="stat-lbl">Cerrados ganados</span>
    </div>
    <div class="stat">
      <span class="stat-num dim">—</span>
      <span class="stat-lbl">Reuniones</span>
      <div class="stat-coming">Próximamente</div>
    </div>
  </div>

  <!-- APPS -->
  <div class="section-label">Aplicaciones del sistema</div>
  <div class="apps" id="apps">

    <!-- CRM -->
    <div class="app" onclick="go('crm.html')">
      <div class="app-icon">
        <svg width="28" height="28" viewBox="0 0 36 36" fill="none" stroke="#B87A4E" stroke-width="1.8" stroke-linecap="round">
          <circle cx="18" cy="12" r="6"/>
          <path d="M4 34c0-7.732 6.268-14 14-14s14 6.268 14 14"/>
        </svg>
      </div>
      <span class="app-name">CRM</span>
    </div>

    <!-- Ventas -->
    <div class="app" onclick="go('ventas.html')">
      <div class="app-icon">
        <svg width="28" height="28" viewBox="0 0 36 36" fill="none" stroke="#B87A4E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3,29 12,18 20,23 33,8"/>
          <polyline points="26,8 33,8 33,15"/>
        </svg>
      </div>
      <span class="app-name">Ventas</span>
    </div>

    <!-- Operaciones -->
    <div class="app" onclick="go('operaciones.html')">
      <div class="app-icon">
        <svg width="28" height="28" viewBox="0 0 36 36" fill="none" stroke="#B87A4E" stroke-width="1.8" stroke-linecap="round">
          <circle cx="18" cy="18" r="5"/>
          <path d="M18 3v4M18 29v4M3 18h4M29 18h4M6.51 6.51l2.83 2.83M26.66 26.66l2.83 2.83M6.51 29.49l2.83-2.83M26.66 9.34l2.83-2.83"/>
        </svg>
      </div>
      <span class="app-name">Operaciones</span>
    </div>

    <!-- Marketing -->
    <div class="app" onclick="go('marketing.html')">

          <path d="M8 13h5l15-9v28L13 23H8z"/>
          <line x1="8" y1="13" x2="8" y2="23"/>

    <!-- Finanzas — director only -->
    <div class="app" id="card-fin" onclick="goDir('finanzas.html')">
      <div class="app-icon">
        <svg width="28" height="28" viewBox="0 0 36 36" fill="none" stroke="#B87A4E" stroke-width="1.8" stroke-linecap="round">
          <rect x="2" y="10" width="32" height="20" rx="2"/>
          <line x1="2" y1="17" x2="34" y2="17"/>
          <circle cx="18" cy="25" r="3"/>
          <line x1="11" y1="5" x2="11" y2="12"/>
          <line x1="25" y1="5" x2="25" y2="12"/>
        </svg>
      </div>
      <span class="app-name">Finanzas</span>
    </div>

    <!-- Equipo -->
    <div class="app" onclick="go('equipo.html')">

    <!-- Documentos Internos -->

          <path d="M8 4h12l8 8v20a2 2 0 01-2 2H8a2 2 0 01-2-2V6a2 2 0 012-2z"/>
          <polyline points="20,4 20,12 28,12"/>
          <line x1="11" y1="20" x2="25" y2="20"/>
          <line x1="11" y1="26" x2="19" y2="26"/>
        </svg>
      </div>
      <span class="app-name">Documentos Internos</span>
    </div>

    <!-- IA — coming soon -->
    <div class="app soon">
      <div class="app-icon">
        <svg width="28" height="28" viewBox="0 0 36 36" fill="none" stroke="#B87A4E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">

        </svg>
      </div>
      <span class="app-name">IA · Automatizaciones</span>
    </div>

    <!-- Academia — coming soon -->
    <div class="app soon">
      <div class="app-icon">
        <svg width="28" height="28" viewBox="0 0 36 36" fill="none" stroke="#B87A4E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="18,5 34,13 18,21 2,13"/>

    <!-- Calendario — coming soon -->
    <div class="app soon">
      <div class="app-icon">

          <rect x="4" y="7" width="28" height="25" rx="2"/>

          <line x1="10" y1="21" x2="10" y2="21"/>
          <line x1="18" y1="21" x2="18" y2="21"/>
          <line x1="26" y1="21" x2="26" y2="21"/>
          <line x1="10" y1="27" x2="10" y2="27"/>
          <line x1="18" y1="27" x2="18" y2="27"/>

  </div><!-- /apps -->

</div><!-- /inner -->
</div><!-- /body -->

<div class="toast" id="toast"></div>

<script>
(function(){
  const s    = JSON.parse(localStorage.getItem('dr_auth_v1')||'{}');
  const role = (typeof _getRole==='function') ? _getRole() : 'team';

  if(s.email) document.getElementById('h-user').textContent = s.email;

  const first = s.email ? s.email.split('.')[0] : 'Diana';
  const name  = first.charAt(0).toUpperCase()+first.slice(1);
  const hr    = new Date().getHours();
  const hi    = hr<12?'Buenos días':hr<19?'Buenas tardes':'Buenas noches';
  document.getElementById('greeting').innerHTML = hi+', <b>'+name+'</b>';

  document.getElementById('g-date').textContent = new Date()
    .toLocaleDateString('es-PE',{weekday:'long',day:'numeric',month:'long',year:'numeric'})
    .replace(/^\w/,c=>c.toUpperCase());

  document.getElementById('g-role').textContent =
    role==='director'?'Directivo · Acceso total':'Equipo · Acceso operativo';

  if(role!=='director'){
    const el=document.getElementById('card-fin');
    if(el) el.classList.add('locked');
  }
})();

async function loadStats(){
  try{
    const {data,error}=await _supabase.from('leads').select('estado,valor_estimado');
    if(error) throw error;
    const leads  = data||[];
    const activos= leads.filter(l=>!['cerrado_ganado','cerrado_perdido'].includes(l.estado));
    const ganados= leads.filter(l=>l.estado==='cerrado_ganado');
    const val    = activos.reduce((s,l)=>s+(parseFloat(l.valor_estimado)||0),0);
    document.getElementById('s-total').textContent   = leads.length;
    document.getElementById('s-activos').textContent = activos.length;
    document.getElementById('s-valor').textContent   = '$'+val.toLocaleString('en-US');
    document.getElementById('s-ganados').textContent = ganados.length;
  }catch(e){
    ['s-total','s-activos','s-valor','s-ganados'].forEach(id=>{
      document.getElementById(id).textContent='—';
    });
  }
}

function go(url){ location.href=url; }

function goDir(url){
  const role=(typeof _getRole==='function')?_getRole():'team';
  if(role==='director'){ location.href=url; }
  else{ showToast('Acceso restringido · Solo directivos',true); }
}

let _tt;
function showToast(msg,warn){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast on'+(warn?' warn':'');
  clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('on'),3000);
}

loadStats();
</script>
</body>
</html>
